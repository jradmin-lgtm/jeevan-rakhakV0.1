// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

// Resolve the node binary. Android Studio's gradle daemon does not inherit
// the shell PATH on macOS, so a bare `node` fails when this project is opened
// in Android Studio directly. Order: env var → gradle.properties → common
// install locations → bare `node` (works from terminal where PATH is set).
def nodeBin = System.getenv("NODE_BINARY") ?:
    (providers.gradleProperty("NODE_BINARY").orNull) ?:
    (["/opt/homebrew/bin/node", "/usr/local/bin/node", "/usr/bin/node"].find { new File(it).exists() }) ?:
    "node"
ext.NODE_BIN = nodeBin

def reactNativeAndroidDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine(nodeBin, "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim(),
  "../android"
)

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url(reactNativeAndroidDir)
    }

    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
