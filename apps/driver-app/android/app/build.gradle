apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

// In a monorepo, `rootDir` can resolve to the workspace root; use `projectDir` to reliably
// point at the app folder (where `package.json` / `index.js` live).
def projectRoot = projectDir.getAbsoluteFile().getParentFile().getParentFile().getAbsolutePath()

// Inherits the resolved node path from the root build.gradle so Android Studio
// builds work without the shell PATH being injected.
def nodeBin = rootProject.hasProperty("NODE_BIN") ? rootProject.ext.NODE_BIN :
    (System.getenv("NODE_BINARY") ?: (findProperty("NODE_BINARY")) ?:
    (["/opt/homebrew/bin/node", "/usr/local/bin/node", "/usr/bin/node"].find { new File(it).exists() }) ?: "node")

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    entryFile = file([nodeBin, "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, projectDir).text.trim())
    reactNativeDir = new File([nodeBin, "--print", "require.resolve('react-native/package.json')"].execute(null, projectDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File([nodeBin, "--print", "require.resolve('react-native/package.json')"].execute(null, projectDir).text.trim()).getParentFile().getAbsolutePath() + "/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File([nodeBin, "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, projectDir).text.trim()).getParentFile().getAbsoluteFile()

    enableBundleCompression = (findProperty('android.enableBundleCompression') ?: false).toBoolean()
    // Use Expo CLI to bundle the app, this ensures the Metro config
    // works correctly with Expo projects.
    cliFile = new File([nodeBin, "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, projectDir).text.trim())
    bundleCommand = "export:embed"

    /* Folders */
     //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]

    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = (findProperty('android.enableProguardInReleaseBuilds') ?: false).toBoolean()

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

def readEasProjectId = {
    def fromEnv = (System.getenv("DRIVER_EAS_PROJECT_ID") ?: System.getenv("USER_EAS_PROJECT_ID") ?: System.getenv("EAS_PROJECT_ID") ?: "").trim()
    if (fromEnv) return fromEnv
    def easFile = rootProject.file("../eas-project.json")
    if (!easFile.exists()) {
        throw new GradleException("Missing eas-project.json next to the app (or set DRIVER_EAS_PROJECT_ID) for expo-updates.")
    }
    def json = new groovy.json.JsonSlurper().parse(easFile)
    return json.expoProjectId?.toString()?.trim() ?: ""
}

def easProjectId = readEasProjectId()
def easProjectIdBanned = ["REPLACE", "PASTE", "SET_", "YOUR_", "CHANGE", "TODO", "FIXME"]
def isReleaseAndroidTask = gradle.startParameter.taskNames.any { tn ->
    def n = tn.toLowerCase()
    n.contains("release") && (n.contains("bundle") || n.contains("assemble") || n.contains("install"))
}
if (isReleaseAndroidTask) {
    if (!easProjectId) {
        throw new GradleException("expoProjectId is empty. Set apps/driver-app/eas-project.json from Expo (Project ID) or USER_EAS_PROJECT_ID.")
    }
    if (easProjectIdBanned.any { easProjectId.contains(it) }) {
        throw new GradleException("expoProjectId still contains a placeholder token.")
    }
    if (!(easProjectId ==~ /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$/)) {
        throw new GradleException("expoProjectId must be a UUID (Expo EAS project id). Got: ${easProjectId}")
    }
}

// Pin androidx.core to a version that doesn't require compileSdk 36 / AGP 8.9.1.
// Expo SDK 53 ships compileSdk 35 + AGP 8.8.2; some libraries (e.g. recent
// expo-modules-core) transitively pull androidx.core 1.17.0 which is "too new".
configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.15.0'
        force 'androidx.core:core-ktx:1.15.0'
    }
}

android {
    ndkVersion rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace 'com.jeevanrakshak.driver'
    defaultConfig {
        applicationId 'com.jeevanrakshak.driver'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 5
        versionName "1.0.0"
        manifestPlaceholders = [expoUpdatesUrl: "https://u.expo.dev/${easProjectId}"]
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            shrinkResources (findProperty('android.enableShrinkResourcesInReleaseBuilds')?.toBoolean() ?: false)
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            crunchPngs (findProperty('android.enablePngCrunchInReleaseBuilds')?.toBoolean() ?: true)
        }
    }
    packagingOptions {
        jniLibs {
            useLegacyPackaging (findProperty('expo.useLegacyPackaging')?.toBoolean() ?: false)
        }
    }
    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }
}

// Apply static values from `gradle.properties` to the `android.packagingOptions`
// Accepts values in comma delimited lists, example:
// android.packagingOptions.pickFirsts=/LICENSE,**/picasa.ini
["pickFirsts", "excludes", "merges", "doNotStrip"].each { prop ->
    // Split option: 'foo,bar' -> ['foo', 'bar']
    def options = (findProperty("android.packagingOptions.$prop") ?: "").split(",");
    // Trim all elements in place.
    for (i in 0..<options.size()) options[i] = options[i].trim();
    // `[] - ""` is essentially `[""].filter(Boolean)` removing all empty strings.
    options -= ""

    if (options.length > 0) {
        println "android.packagingOptions.$prop += $options ($options.length)"
        // Ex: android.packagingOptions.pickFirsts += '**/SCCS/**'
        options.each {
            android.packagingOptions[prop] += it
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        // For animated gif support
        implementation("com.facebook.fresco:animated-gif:${expoLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        // For webp support
        implementation("com.facebook.fresco:webpsupport:${expoLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            // Animated webp support
            implementation("com.facebook.fresco:animated-webp:${expoLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// RN autolinking can emit expo.core.ExpoModulesPackage; the type lives in expo.modules (Expo SDK 53).
afterEvaluate {
    def fixAutolinkingExpoImport = tasks.register('fixAutolinkingExpoImport') {
        doLast {
            def packageListFile = file("${project.buildDir}/generated/autolinking/src/main/java/com/facebook/react/PackageList.java")
            if (packageListFile.exists()) {
                def text = packageListFile.getText('UTF-8')
                def updated = text.replace('expo.core.ExpoModulesPackage', 'expo.modules.ExpoModulesPackage')
                if (text != updated) {
                    packageListFile.write(updated, 'UTF-8')
                }
            }
        }
    }
    def gen = tasks.findByName('generateAutolinkingPackageList')
    if (gen != null) {
        gen.finalizedBy(fixAutolinkingExpoImport)
    }
}
