name: ci

on:
  push:
    branches: ["main", "prod"]
  pull_request:
    branches: ["main", "prod"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Pin via package.json's `"packageManager": "pnpm@10.8.1"` instead of a
        # `version:` arg — pnpm/action-setup@v4 errors out (ERR_PNPM_BAD_PM_VERSION)
        # when both are set, since they can silently drift.
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Typecheck
        run: pnpm check
